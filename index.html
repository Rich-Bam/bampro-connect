<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%233b82f6'/></svg>" />
    <title>Peplink GPS Map</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: #0b0f19;
        color: #e5e7eb;
      }

      #map {
        height: 100%;
        width: 100%;
      }

      .panel {
        position: absolute;
        top: 16px;
        left: 64px;
        background: rgba(17, 24, 39, 0.95);
        padding: 12px 14px;
        border-radius: 10px;
        z-index: 1000;
        font-size: 14px;
        min-width: 240px;
      }

      .panel.is-stale {
        border: 1px solid rgba(248, 113, 113, 0.6);
        background: rgba(127, 29, 29, 0.35);
      }

      .panel-right {
        position: absolute;
        top: 16px;
        right: 16px;
        background: rgba(17, 24, 39, 0.95);
        padding: 12px 14px;
        border-radius: 10px;
        z-index: 1000;
        font-size: 14px;
        min-width: 240px;
        max-width: 320px;
      }

      .wan-list {
        list-style: none;
        margin: 8px 0 0;
        padding: 0;
        display: grid;
        gap: 8px;
      }

      .wan-item {
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(30, 41, 59, 0.7);
      }

      .wan-item.is-connected {
        border: 1px solid rgba(34, 197, 94, 0.5);
        background: rgba(22, 101, 52, 0.25);
      }

      .wan-item.is-disconnected {
        border: 1px solid rgba(248, 113, 113, 0.6);
        background: rgba(127, 29, 29, 0.25);
      }

      .wan-item strong {
        display: block;
        font-size: 13px;
        margin-bottom: 2px;
      }

      .wan-meta {
        color: #9ca3af;
        font-size: 12px;
      }

      .panel h1 {
        font-size: 16px;
        margin: 0 0 6px;
      }

      .status {
        color: #9ca3af;
        margin: 6px 0 0;
      }

      .dmm {
        margin-top: 6px;
        font-size: 16px;
        font-weight: 700;
        color: #f8fafc;
      }

      .badge {
        display: inline-block;
        margin-top: 6px;
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(59, 130, 246, 0.2);
        color: #93c5fd;
        font-size: 12px;
        font-weight: 600;
      }

      .badge-stale {
        background: rgba(248, 113, 113, 0.2);
        color: #fca5a5;
      }

      .gps-source-badge {
        display: inline-block;
        margin-top: 8px;
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
      }

      .gps-source-starlink {
        background: rgba(34, 197, 94, 0.2);
        border: 1px solid rgba(34, 197, 94, 0.5);
        color: #4ade80;
      }

      .gps-source-device {
        background: rgba(245, 158, 11, 0.2);
        border: 1px solid rgba(245, 158, 11, 0.6);
        color: #fbbf24;
      }

      .auth-overlay {
        position: fixed;
        inset: 0;
        background: rgba(3, 7, 18, 0.92);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2000;
      }

      .auth-card {
        width: min(360px, 90vw);
        background: #111827;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      }

      .auth-card h2 {
        margin: 0 0 10px;
        font-size: 18px;
      }

      .auth-card p {
        margin: 0 0 12px;
        color: #9ca3af;
        font-size: 14px;
      }

      .auth-card input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #374151;
        background: #0b1220;
        color: #e5e7eb;
        margin-bottom: 10px;
      }

      .auth-card button {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: none;
        background: #3b82f6;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }

      .auth-error {
        color: #f87171;
        font-size: 13px;
        margin-top: 8px;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <div class="auth-overlay" id="auth-overlay">
      <div class="auth-card">
        <form id="auth-form" novalidate>
          <h2>Login</h2>
          <p>Enter the password to view the live GPS map.</p>
          <input id="auth-password" type="password" placeholder="Password" autocomplete="current-password" />
          <button type="submit" id="auth-submit">Unlock Map</button>
          <div class="auth-error" id="auth-error"></div>
        </form>
      </div>
    </div>
    <div class="panel">
      <h1>Peplink GPS Location</h1>
      <div id="device-name">Device: —</div>
      <div id="gps-source-badge" class="gps-source-badge" style="display: none;"></div>
      <div id="coords">Location: —</div>
      <div id="speed">Speed: —</div>
      <div id="updated">Updated: —</div>
      <div id="stale-badge" class="badge badge-stale" style="display: none;">STALE &gt; 20s</div>
      <div id="status" class="status">Enter password and unlock to load GPS data.</div>
    </div>
    <div class="panel-right">
      <h1>WAN Status</h1>
      <ul id="wan-list" class="wan-list"></ul>
    </div>
    <div id="map"></div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      const map = L.map("map").setView([20, 0], 2);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 18,
        attribution: "&copy; OpenStreetMap contributors",
      }).addTo(map);

      const statusEl = document.getElementById("status");
      const deviceNameEl = document.getElementById("device-name");
      const gpsSourceBadgeEl = document.getElementById("gps-source-badge");
      const coordsEl = document.getElementById("coords");
      const speedEl = document.getElementById("speed");
      const updatedEl = document.getElementById("updated");
      const staleBadgeEl = document.getElementById("stale-badge");
      const panelEl = document.querySelector(".panel");
      const authOverlay = document.getElementById("auth-overlay");
      const authPasswordInput = document.getElementById("auth-password");
      const authSubmit = document.getElementById("auth-submit");
      const authError = document.getElementById("auth-error");
      const wanListEl = document.getElementById("wan-list");

      let marker = null;
      let trackLine = null;
      let hasFitTrack = false;
      const trackPoints = [];
      const trackLimit = 5000;
      const PASSWORD = "Zwerver2";

      let lastUpdatedAt = null;
      let lastTimeSource = null;
      let lastSourceLabel = "";
      let ageTickIntervalId = null;

      function toDmm(dec, isLat) {
        const dir = isLat ? (dec >= 0 ? "N" : "S") : (dec >= 0 ? "E" : "W");
        const abs = Math.abs(dec);
        const deg = Math.floor(abs);
        const min = (abs - deg) * 60;
        return `${deg}° ${min.toFixed(3)}' ${dir}`;
      }

      function parseCoord(value) {
        if (typeof value === "number" && !Number.isNaN(value)) {
          return value;
        }
        if (typeof value === "string" && value.trim() !== "") {
          const normalized = value.replace(",", ".");
          const parsed = Number(normalized);
          if (!Number.isNaN(parsed)) {
            return parsed;
          }
        }
        return null;
      }

      function formatUpdatedAt(isoString, timeSource) {
        const gpsAgeUnknown =
          timeSource === "starlink_gps_no_time" ||
          timeSource === "device_gps_no_time" ||
          timeSource === "fetched_at";
        if (!isoString) {
          return {
            label: "Updated: unknown",
            age: "",
            ageSeconds: null,
          };
        }
        const hasTz = /[zZ]|[+-]\d{2}:?\d{2}$/.test(isoString);
        const normalized = hasTz ? isoString : `${isoString}Z`;
        const parsed = new Date(normalized);
        if (Number.isNaN(parsed.getTime())) {
          return {
            label: `Updated: ${isoString}`,
            age: "",
            ageSeconds: null,
          };
        }
        const now = new Date();
        const diffMs = now.getTime() - parsed.getTime();
        const diffSec = Math.max(0, Math.floor(diffMs / 1000));
        const minutes = Math.floor(diffSec / 60);
        const hours = Math.floor(minutes / 60);
        const days = Math.floor(hours / 24);
        let ageText = "";
        if (days > 0) {
          ageText = `${days}d ${hours % 24}h`;
        } else if (hours > 0) {
          ageText = `${hours}h ${minutes % 60}m`;
        } else if (minutes > 0) {
          ageText = `${minutes}m`;
        } else {
          ageText = `${diffSec}s`;
        }
        const amsterdam = new Intl.DateTimeFormat("nl-NL", {
          timeZone: "Europe/Amsterdam",
          dateStyle: "medium",
          timeStyle: "medium",
        }).format(parsed);
        return {
          label: `Updated (Amsterdam): ${amsterdam}`,
          age: gpsAgeUnknown
            ? `Last fetched: ${ageText} ago`
            : `Last GPS age: ${ageText} ago`,
          ageSeconds: diffSec,
        };
      }

      function tickAgeDisplay() {
        if (lastUpdatedAt == null) return;
        const updatedInfo = formatUpdatedAt(lastUpdatedAt, lastTimeSource);
        const isStale = typeof updatedInfo.ageSeconds === "number"
          ? updatedInfo.ageSeconds > 20
          : false;
        if (panelEl) {
          panelEl.classList.toggle("is-stale", isStale);
        }
        staleBadgeEl.style.display = isStale ? "inline-block" : "none";
        updatedEl.innerHTML = `${updatedInfo.label}${updatedInfo.age ? `<br />${updatedInfo.age}` : ""}${lastSourceLabel ? `<br />${lastSourceLabel}` : ""}`;
      }

      async function fetchLocation() {
        statusEl.textContent = "Fetching GPS…";
        try {
          const response = await fetch(
            `https://bbivyjrlcqjfkabhjjap.functions.supabase.co/peplink-location?t=${Date.now()}`,
            { cache: "no-store" }
          );
          if (!response.ok) {
            throw new Error(`Request failed (${response.status})`);
          }
          const data = await response.json();

          deviceNameEl.textContent = `Device: ${data.device_name || data.device_id}`;
          const updatedInfo = formatUpdatedAt(data.updated_at, data.time_source);
          const sourceLabel = data.time_source ? `Source: ${data.time_source}` : "";
          lastUpdatedAt = data.updated_at;
          lastTimeSource = data.time_source;
          lastSourceLabel = sourceLabel;

          const gpsSource = data.gps_source || (data.time_source && data.time_source.startsWith("starlink") ? "starlink" : data.time_source && data.time_source.startsWith("device") ? "device" : null);
          if (data.location_available && gpsSource) {
            gpsSourceBadgeEl.style.display = "block";
            gpsSourceBadgeEl.className = `gps-source-badge gps-source-${gpsSource}`;
            gpsSourceBadgeEl.textContent = gpsSource === "starlink" ? "Starlink GPS (trusted)" : "Device GPS – may be spoofed";
          } else {
            gpsSourceBadgeEl.style.display = "none";
          }
          const isStale = typeof updatedInfo.ageSeconds === "number"
            ? updatedInfo.ageSeconds > 20
            : false;
          if (panelEl) {
            panelEl.classList.toggle("is-stale", isStale);
          }
          staleBadgeEl.style.display = isStale ? "inline-block" : "none";
          updatedEl.innerHTML = `${updatedInfo.label}${updatedInfo.age ? `<br />${updatedInfo.age}` : ""}${sourceLabel ? `<br />${sourceLabel}` : ""}`;

          if (!data.location_available || data.lat == null || data.lng == null) {
            gpsSourceBadgeEl.style.display = "none";
            statusEl.textContent = "No GPS fix available yet.";
            coordsEl.textContent = "Location: —";
            speedEl.textContent = "Speed: —";
            return;
          }

          const lat = Number(data.lat);
          const lng = Number(data.lng);
          const dmmLat = toDmm(lat, true);
          const dmmLng = toDmm(lng, false);
          coordsEl.innerHTML = `Location: ${lat.toFixed(6)}, ${lng.toFixed(6)}<div class="dmm">DMM: ${dmmLat}, ${dmmLng}</div><div class="badge">DMM format</div>`;
          const speedKmh = typeof data.speed_kmh === "number"
            ? data.speed_kmh
            : typeof data.speed_kmh === "string" && data.speed_kmh.trim() !== ""
              ? Number(data.speed_kmh)
              : null;
          const speedKn = typeof data.speed_kn === "number"
            ? data.speed_kn
            : typeof data.speed_kn === "string" && data.speed_kn.trim() !== ""
              ? Number(data.speed_kn)
              : null;
          let fallbackSpeedKmh = null;
          const useApiSpeed = Number.isFinite(speedKmh) && speedKmh !== null && speedKmh > 0;
          if (!useApiSpeed && Array.isArray(data.track) && data.track.length >= 2) {
            const lastPoint = data.track[data.track.length - 1];
            const prevPoint = data.track[data.track.length - 2];
            const prevLat = parseCoord(prevPoint.lat);
            const prevLng = parseCoord(prevPoint.lng ?? prevPoint.lon);
            const lastLat = parseCoord(lastPoint.lat);
            const lastLng = parseCoord(lastPoint.lng ?? lastPoint.lon);
            const t1 = Date.parse(prevPoint.recorded_at);
            const t2 = Date.parse(lastPoint.recorded_at);
            const deltaMs = t2 - t1;
            const maxSegmentMs = 30 * 60 * 1000;
            if (prevLat !== null && prevLng !== null && lastLat !== null && lastLng !== null && !Number.isNaN(t1) && !Number.isNaN(t2) && t2 > t1 && deltaMs <= maxSegmentMs && deltaMs >= 3000) {
              const distanceKm = (function haversineKm(lat1, lng1, lat2, lng2) {
                const toRad = (value) => (value * Math.PI) / 180;
                const dLat = toRad(lat2 - lat1);
                const dLng = toRad(lng2 - lng1);
                const a =
                  Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                  Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
                    Math.sin(dLng / 2) * Math.sin(dLng / 2);
                return 2 * 6371 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
              })(prevLat, prevLng, lastLat, lastLng);
              const hours = (t2 - t1) / (1000 * 60 * 60);
              if (hours > 0) {
                fallbackSpeedKmh = distanceKm / hours;
              }
            }
          }
          const effectiveSpeedKmh = useApiSpeed ? speedKmh : fallbackSpeedKmh;
          if (typeof effectiveSpeedKmh === "number" && !Number.isNaN(effectiveSpeedKmh)) {
            const knots =
              typeof speedKn === "number" && !Number.isNaN(speedKn)
                ? speedKn
                : effectiveSpeedKmh / 1.852;
            speedEl.textContent = `Speed: ${effectiveSpeedKmh.toFixed(1)} km/h (${knots.toFixed(1)} kn)`;
          } else {
            speedEl.textContent = "Speed: —";
          }
          const fallbackNote = data.location_fallback ? " Using last known position." : "";
          statusEl.textContent = isStale
            ? `GPS is stale (older than 20s).${fallbackNote}`
            : `Live GPS active.${fallbackNote}`;

          if (Array.isArray(data.wan_status)) {
            wanListEl.innerHTML = "";
            data.wan_status.forEach((wan) => {
              const li = document.createElement("li");
              const statusText = (wan.status || "").toString().toLowerCase();
              const isConnected = statusText.includes("connected");
              li.className = `wan-item ${isConnected ? "is-connected" : "is-disconnected"}`;
              li.innerHTML = `
                <strong>${wan.name || "WAN"}</strong>
                <div class="wan-meta">${wan.status || "Unknown"}</div>
              `;
              wanListEl.appendChild(li);
            });
          }

          if (!marker) {
            marker = L.marker([lat, lng]).addTo(map);
            map.setView([lat, lng], 10);
          } else {
            marker.setLatLng([lat, lng]);
          }

          if (Array.isArray(data.track) && data.track.length > 0) {
            const newTrackPoints = [];
            for (const point of data.track.slice(-trackLimit)) {
              const trackLat = parseCoord(point.lat);
              const trackLng = parseCoord(point.lng ?? point.lon);
              if (trackLat !== null && trackLng !== null) {
                newTrackPoints.push([trackLat, trackLng]);
              }
            }
            trackPoints.length = 0;
            trackPoints.push(...newTrackPoints);
          } else {
            const lastPoint = trackPoints[trackPoints.length - 1];
            if (!lastPoint || lastPoint[0] !== lat || lastPoint[1] !== lng) {
              trackPoints.push([lat, lng]);
            }
          }
          const lastTrackPoint = trackPoints[trackPoints.length - 1];
          if (lastTrackPoint && (lastTrackPoint[0] !== lat || lastTrackPoint[1] !== lng)) {
            trackPoints.push([lat, lng]);
          }

          if (trackPoints.length > trackLimit) {
            trackPoints.splice(0, trackPoints.length - trackLimit);
          }

          if (trackPoints.length >= 2) {
            if (!trackLine) {
              trackLine = L.polyline(trackPoints, {
                color: "#1d4ed8",
                weight: 3,
                opacity: 0.85,
              }).addTo(map);
              if (!hasFitTrack) {
                map.fitBounds(trackLine.getBounds(), { padding: [20, 20] });
                hasFitTrack = true;
              }
            } else {
              trackLine.setLatLngs(trackPoints);
            }
          }
        } catch (error) {
          statusEl.textContent = "Failed to fetch GPS data. Check your connection and try again.";
          console.error("GPS fetch error:", error);
        }
      }

      function unlockMap() {
        sessionStorage.setItem("gps_auth", "true");
        authOverlay.style.display = "none";
        fetchLocation();
        setInterval(fetchLocation, 5000);
        if (ageTickIntervalId != null) clearInterval(ageTickIntervalId);
        ageTickIntervalId = setInterval(tickAgeDisplay, 1000);
      }

      document.getElementById("auth-form").addEventListener("submit", (event) => {
        event.preventDefault();
        const value = authPasswordInput.value || "";
        if (value === PASSWORD) {
          authError.textContent = "";
          unlockMap();
        } else {
          authError.textContent = "Incorrect password.";
        }
      });

      if (sessionStorage.getItem("gps_auth") === "true") {
        authOverlay.style.display = "none";
        fetchLocation();
        setInterval(fetchLocation, 5000);
        if (ageTickIntervalId != null) clearInterval(ageTickIntervalId);
        ageTickIntervalId = setInterval(tickAgeDisplay, 1000);
      }
    </script>
  </body>
</html>
