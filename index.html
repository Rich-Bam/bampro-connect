<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Peplink GPS Map</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: #0b0f19;
        color: #e5e7eb;
      }

      #map {
        height: 100%;
        width: 100%;
      }

      .panel {
        position: absolute;
        top: 16px;
        left: 64px;
        background: rgba(17, 24, 39, 0.95);
        padding: 12px 14px;
        border-radius: 10px;
        z-index: 1000;
        font-size: 14px;
        min-width: 240px;
      }

      .panel.is-stale {
        border: 1px solid rgba(248, 113, 113, 0.6);
        background: rgba(127, 29, 29, 0.35);
      }

      .panel-right {
        position: absolute;
        top: 16px;
        right: 16px;
        background: rgba(17, 24, 39, 0.95);
        padding: 12px 14px;
        border-radius: 10px;
        z-index: 1000;
        font-size: 14px;
        min-width: 240px;
        max-width: 320px;
      }

      .wan-list {
        list-style: none;
        margin: 8px 0 0;
        padding: 0;
        display: grid;
        gap: 8px;
      }

      .wan-item {
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(30, 41, 59, 0.7);
      }

      .wan-item.is-connected {
        border: 1px solid rgba(34, 197, 94, 0.5);
        background: rgba(22, 101, 52, 0.25);
      }

      .wan-item.is-disconnected {
        border: 1px solid rgba(248, 113, 113, 0.6);
        background: rgba(127, 29, 29, 0.25);
      }

      .wan-item strong {
        display: block;
        font-size: 13px;
        margin-bottom: 2px;
      }

      .wan-meta {
        color: #9ca3af;
        font-size: 12px;
      }

      .panel h1 {
        font-size: 16px;
        margin: 0 0 6px;
      }

      .status {
        color: #9ca3af;
        margin: 6px 0 0;
      }

      .dmm {
        margin-top: 6px;
        font-size: 16px;
        font-weight: 700;
        color: #f8fafc;
      }

      .badge {
        display: inline-block;
        margin-top: 6px;
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(59, 130, 246, 0.2);
        color: #93c5fd;
        font-size: 12px;
        font-weight: 600;
      }

      .badge-stale {
        background: rgba(248, 113, 113, 0.2);
        color: #fca5a5;
      }

      .auth-overlay {
        position: fixed;
        inset: 0;
        background: rgba(3, 7, 18, 0.92);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2000;
      }

      .auth-card {
        width: min(360px, 90vw);
        background: #111827;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      }

      .auth-card h2 {
        margin: 0 0 10px;
        font-size: 18px;
      }

      .auth-card p {
        margin: 0 0 12px;
        color: #9ca3af;
        font-size: 14px;
      }

      .auth-card input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #374151;
        background: #0b1220;
        color: #e5e7eb;
        margin-bottom: 10px;
      }

      .auth-card button {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: none;
        background: #3b82f6;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }

      .auth-error {
        color: #f87171;
        font-size: 13px;
        margin-top: 8px;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <div class="auth-overlay" id="auth-overlay">
      <div class="auth-card">
        <h2>Login</h2>
        <p>Enter the password to view the live GPS map.</p>
        <input id="auth-password" type="password" placeholder="Password" />
        <button id="auth-submit">Unlock Map</button>
        <div class="auth-error" id="auth-error"></div>
      </div>
    </div>
    <div class="panel">
      <h1>Peplink GPS Location</h1>
      <div id="device-name">Device: loading…</div>
      <div id="coords">Location: —</div>
      <div id="speed">Speed: —</div>
      <div id="updated">Updated: —</div>
      <div id="stale-badge" class="badge badge-stale" style="display: none;">STALE &gt; 20s</div>
      <div id="status" class="status">Fetching GPS…</div>
    </div>
    <div class="panel-right">
      <h1>WAN Status</h1>
      <ul id="wan-list" class="wan-list"></ul>
    </div>
    <div id="map"></div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      const map = L.map("map").setView([20, 0], 2);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 18,
        attribution: "&copy; OpenStreetMap contributors",
      }).addTo(map);

      const statusEl = document.getElementById("status");
      const deviceNameEl = document.getElementById("device-name");
      const coordsEl = document.getElementById("coords");
      const speedEl = document.getElementById("speed");
      const updatedEl = document.getElementById("updated");
      const staleBadgeEl = document.getElementById("stale-badge");
      const panelEl = document.querySelector(".panel");
      const authOverlay = document.getElementById("auth-overlay");
      const authPasswordInput = document.getElementById("auth-password");
      const authSubmit = document.getElementById("auth-submit");
      const authError = document.getElementById("auth-error");
      const wanListEl = document.getElementById("wan-list");

      let marker = null;
      let trackLine = null;
      const trackPoints = [];
      const trackLimit = 5000;
      const PASSWORD = "Zwerver2";

      function toDmm(dec, isLat) {
        const dir = isLat ? (dec >= 0 ? "N" : "S") : (dec >= 0 ? "E" : "W");
        const abs = Math.abs(dec);
        const deg = Math.floor(abs);
        const min = (abs - deg) * 60;
        return `${deg}° ${min.toFixed(3)}' ${dir}`;
      }

      function formatUpdatedAt(isoString) {
        if (!isoString) {
          return { label: "Updated: unknown", age: "", ageSeconds: null };
        }
        const hasTz = /[zZ]|[+-]\d{2}:?\d{2}$/.test(isoString);
        const normalized = hasTz ? isoString : `${isoString}Z`;
        const parsed = new Date(normalized);
        if (Number.isNaN(parsed.getTime())) {
          return { label: `Updated: ${isoString}`, age: "", ageSeconds: null };
        }
        const now = new Date();
        const diffMs = now.getTime() - parsed.getTime();
        const diffSec = Math.max(0, Math.floor(diffMs / 1000));
        const minutes = Math.floor(diffSec / 60);
        const hours = Math.floor(minutes / 60);
        const days = Math.floor(hours / 24);
        let age = "";
        if (days > 0) {
          age = `${days}d ${hours % 24}h`;
        } else if (hours > 0) {
          age = `${hours}h ${minutes % 60}m`;
        } else if (minutes > 0) {
          age = `${minutes}m`;
        } else {
          age = `${diffSec}s`;
        }
        const amsterdam = new Intl.DateTimeFormat("nl-NL", {
          timeZone: "Europe/Amsterdam",
          dateStyle: "medium",
          timeStyle: "medium",
        }).format(parsed);
        return {
          label: `Updated (Amsterdam): ${amsterdam}`,
          age: `Last GPS age: ${age} ago`,
          ageSeconds: diffSec,
        };
      }

      async function fetchLocation() {
        try {
          const response = await fetch(
            `https://bbivyjrlcqjfkabhjjap.functions.supabase.co/peplink-location?t=${Date.now()}`,
            { cache: "no-store" }
          );
          if (!response.ok) {
            throw new Error(`Request failed (${response.status})`);
          }
          const data = await response.json();

          deviceNameEl.textContent = `Device: ${data.device_name || data.device_id}`;
          const updatedInfo = formatUpdatedAt(data.updated_at);
          const sourceLabel = data.time_source ? `Source: ${data.time_source}` : "";
          const isStale = typeof updatedInfo.ageSeconds === "number"
            ? updatedInfo.ageSeconds > 20
            : false;
          if (panelEl) {
            panelEl.classList.toggle("is-stale", isStale);
          }
          staleBadgeEl.style.display = isStale ? "inline-block" : "none";
          updatedEl.innerHTML = `${updatedInfo.label}${updatedInfo.age ? `<br />${updatedInfo.age}` : ""}${sourceLabel ? `<br />${sourceLabel}` : ""}`;

          if (!data.location_available || data.lat == null || data.lng == null) {
            statusEl.textContent = "No Starlink GPS fix available yet.";
            coordsEl.textContent = "Location: —";
            speedEl.textContent = "Speed: —";
            return;
          }

          const lat = Number(data.lat);
          const lng = Number(data.lng);
          const dmmLat = toDmm(lat, true);
          const dmmLng = toDmm(lng, false);
          coordsEl.innerHTML = `Location: ${lat.toFixed(6)}, ${lng.toFixed(6)}<div class="dmm">DMM: ${dmmLat}, ${dmmLng}</div><div class="badge">DMM format</div>`;
          if (typeof data.speed_kmh === "number" && !Number.isNaN(data.speed_kmh)) {
            const knots =
              typeof data.speed_kn === "number" && !Number.isNaN(data.speed_kn)
                ? data.speed_kn
                : data.speed_kmh / 1.852;
            speedEl.textContent = `Speed: ${data.speed_kmh.toFixed(1)} km/h (${knots.toFixed(1)} kn)`;
          } else {
            speedEl.textContent = "Speed: —";
          }
          const fallbackNote = data.location_fallback ? " Using last known Starlink GPS." : "";
          statusEl.textContent = isStale
            ? `GPS is stale (older than 20s).${fallbackNote}`
            : `Live GPS active.${fallbackNote}`;

          if (Array.isArray(data.wan_status)) {
            wanListEl.innerHTML = "";
            data.wan_status.forEach((wan) => {
              const li = document.createElement("li");
              const statusText = (wan.status || "").toString().toLowerCase();
              const isConnected = statusText.includes("connected");
              li.className = `wan-item ${isConnected ? "is-connected" : "is-disconnected"}`;
              li.innerHTML = `
                <strong>${wan.name || "WAN"}</strong>
                <div class="wan-meta">${wan.status || "Unknown"}${wan.ip ? ` • ${wan.ip}` : ""}</div>
              `;
              wanListEl.appendChild(li);
            });
          }

          if (!marker) {
            marker = L.marker([lat, lng]).addTo(map);
            map.setView([lat, lng], 10);
          } else {
            marker.setLatLng([lat, lng]);
          }

          if (Array.isArray(data.track) && data.track.length > 0) {
            trackPoints.length = 0;
            for (const point of data.track.slice(-trackLimit)) {
              if (typeof point.lat === "number" && typeof point.lng === "number") {
                trackPoints.push([point.lat, point.lng]);
              }
            }
          } else {
            const lastPoint = trackPoints[trackPoints.length - 1];
            if (!lastPoint || lastPoint[0] !== lat || lastPoint[1] !== lng) {
              trackPoints.push([lat, lng]);
            }
          }

          if (trackPoints.length > trackLimit) {
            trackPoints.splice(0, trackPoints.length - trackLimit);
          }

          if (!trackLine) {
            trackLine = L.polyline(trackPoints, {
              color: "#1d4ed8",
              weight: 3,
              opacity: 0.85,
            }).addTo(map);
          } else {
            trackLine.setLatLngs(trackPoints);
          }
        } catch (error) {
          statusEl.textContent = "Failed to fetch GPS data.";
        }
      }

      function unlockMap() {
        sessionStorage.setItem("gps_auth", "true");
        authOverlay.style.display = "none";
      fetchLocation();
      setInterval(fetchLocation, 10000);
      }

      authSubmit.addEventListener("click", () => {
        const value = authPasswordInput.value || "";
        if (value === PASSWORD) {
          authError.textContent = "";
          unlockMap();
        } else {
          authError.textContent = "Incorrect password.";
        }
      });

      authPasswordInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          authSubmit.click();
        }
      });

      if (sessionStorage.getItem("gps_auth") === "true") {
        authOverlay.style.display = "none";
        fetchLocation();
        setInterval(fetchLocation, 10000);
      }
    </script>
  </body>
</html>
